# VLM 전용 GPU 워커 (개발 PC / GPU 서버)
#
# 사전 요구: NVIDIA 드라이버 + Docker NVIDIA Container Toolkit
#
# 실행:
#   docker compose -f docker-compose.vlm-worker.yml up --build
#   헬스: http://localhost:8001/api/health
#   모델: http://localhost:8001/api/vlm/models

services:
  vlm-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.vlm
    container_name: ocr-vlm-worker
    ports:
      - "8001:8001"
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_HOME: /cache/huggingface
      # QWEN_VL_MODEL: Qwen/Qwen2.5-VL-3B-Instruct
    volumes:
      - vlm_hf_cache:/cache/huggingface
    restart: unless-stopped

volumes:
  vlm_hf_cache:
