services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ocr-parser-poc-backend
    ports:
      - "8000:8000"
    environment:
      # GPU PC VLM 워커 URL (예: http://192.168.0.10:8001)
      VLM_WORKER_URL: ${VLM_WORKER_URL:-}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ocr-parser-poc-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
